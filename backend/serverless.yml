service: workable-ats-backend

frameworkVersion: '4'

provider:
  name: aws
  runtime: python3.9
  region: us-east-1
  environment:
    WORKABLE_SUBDOMAIN: ${env:WORKABLE_SUBDOMAIN}
    WORKABLE_API_TOKEN: ${env:WORKABLE_API_TOKEN}
    WORKABLE_API_URL: https://${env:WORKABLE_SUBDOMAIN}.workable.com/spi/v3

plugins:
  - serverless-offline
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: false

functions:                    # <-- SINGLE functions block with ALL functions
  getJobs:
    handler: handlers/jobs.get_jobs
    events:
      - http:
          path: jobs
          method: get
          cors: true
  
  createCandidate:
    handler: handlers/candidates.create_candidate
    events:
      - http:
          path: candidates
          method: post
          cors: true
  
  getApplications:             # <-- New function added here
    handler: handlers/applications.get_applications
    events:
      - http:
          path: applications
          method: get
          cors: true

